<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Prompt Library</h1>
        <div class="header-actions">
          <button id="btn-export" class="btn-secondary">Export</button>
          <button id="btn-import" class="btn-secondary">Import</button>
          <input
            type="file"
            id="import-file"
            accept=".json"
            style="display: none"
          />
        </div>
      </header>

      <main>
        <section class="form-section">
          <h2>Add New Prompt</h2>
          <form id="prompt-form">
            <div class="form-group">
              <label for="prompt-title">Title</label>
              <input
                type="text"
                id="prompt-title"
                required
                placeholder="e.g., Code Review Expert"
              />
            </div>
            <div class="form-group">
              <label for="prompt-model">Model</label>
              <input
                type="text"
                id="prompt-model"
                required
                maxlength="100"
                placeholder="e.g., GPT-4"
              />
            </div>
            <div class="form-group">
              <label for="prompt-content">Prompt Content</label>
              <textarea
                id="prompt-content"
                required
                rows="5"
                placeholder="Enter your prompt here..."
              ></textarea>
            </div>
            <button type="submit" class="btn-save">Save Prompt</button>
          </form>
        </section>

        <section class="prompts-section">
          <div class="section-header">
            <h2>Saved Prompts</h2>
            <div class="filter-group">
              <label for="rating-filter">Filter by Rating:</label>
              <select id="rating-filter">
                <option value="all">All</option>
                <option value="5">5 Stars</option>
                <option value="4">4+ Stars</option>
                <option value="3">3+ Stars</option>
                <option value="2">2+ Stars</option>
                <option value="1">1+ Stars</option>
                <option value="unrated">Unrated</option>
              </select>
            </div>
          </div>
          <div id="prompts-container" class="prompts-grid">
            <!-- Prompt cards will be dynamically added here -->
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
