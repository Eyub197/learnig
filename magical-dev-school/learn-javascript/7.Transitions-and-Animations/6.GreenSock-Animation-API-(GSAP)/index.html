<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GSAP 80/20 Masterclass</title>
        <style>
            body {
                font-family: sans-serif;
                background-color: #111;
                color: #fff;
                padding: 2rem;
            }
            .box {
                width: 100px;
                height: 100px;
                background-color: #88ce02;
                border-radius: 10px;
                margin-bottom: 1rem;
            }
            .circle {
                width: 50px;
                height: 50px;
                background-color: #02aace;
                border-radius: 50%;
                display: inline-block;
                margin: 10px;
            }
            .section {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }
            h1,
            h2 {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>GSAP 80/20 Masterclass</h1>
        <p>
            Open the console to see the logs and scroll down to see the effects.
        </p>

        <div class="box one"></div>
        <div class="box two"></div>
        <div class="box invinsible"></div>
        <div class="box rotate"></div>

        <div class="section">
            <h2>Basic Tween</h2>
            <div class="box box1"></div>
        </div>

        <div class="section">
            <h2>Timeline & Stagger</h2>
            <div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
        </div>

        <div class="section">
            <h2>ScrollTrigger</h2>
            <div class="box box2"></div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
